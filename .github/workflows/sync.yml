name: 'Upstream Sync'

on:
  schedule:
    # 每天 UTC 0:00（北京时间 8:00）执行一次
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发
    inputs:
      sync_test_mode:
        description: 'Fork Sync Test Mode'
        type: boolean
        default: false

jobs:
  sync_latest_from_upstream:
    runs-on: ubuntu-latest
    name: Sync latest commits from upstream repo
    steps:
      # 步骤 1：检出你的目标仓库，并切换到 sync 分支
      - name: Checkout target repo
        uses: actions/checkout@v3
        with:
          ref: sync                    # 指定分支为 sync
          persist-credentials: false   # 关键：不保存默认的 GITHUB_TOKEN，避免后续操作使用错误凭据

      # 步骤 2：执行同步操作
      - name: Sync upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.1
        with:
          target_sync_branch: sync                 # 你的目标分支名
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}  # 操作你仓库的 Token
          upstream_sync_branch: main               # 上游仓库要同步的分支
          upstream_sync_repo: innei-dev/Yohaku     # 上游仓库全名
          upstream_repo_access_token: ${{ secrets.UPSTREAM_REPO_SECRET }}  # 访问上游的 Token
          test_mode: ${{ inputs.sync_test_mode }}  # 测试模式（不会真的推送）

      # 步骤 3：输出结果
      - name: New commits found
        if: steps.sync.outputs.has_new_commits == 'true'
        run: echo "检测到上游有新提交，已同步。"
      - name: No new commits
        if: steps.sync.outputs.has_new_commits == 'false'
        run: echo "上游没有新提交。"
